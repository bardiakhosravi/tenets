name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Bundle content
        run: npm run bundle

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "::error::Package version ($PACKAGE_VERSION) does not match release tag (${{ github.event.release.tag_name }})"
            exit 1
          fi

      - name: Package Spec-Kit preset
        working-directory: ${{ github.workspace }}
        run: |
          cd speckit-preset
          zip -r ../tenets-speckit-preset.zip .

      - name: Upload preset to release
        uses: softprops/action-gh-release@v2
        with:
          files: tenets-speckit-preset.zip

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
